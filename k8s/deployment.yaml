apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-energy-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rl-energy-api
  template:
    metadata:
      labels:
        app: rl-energy-api
    spec:
      containers:
        - name: api
          image: rl-energy:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: rl-energy-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
