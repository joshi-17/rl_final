name: CI

on:
  push:
    branches: [main, dev, feature/**]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q --cache-clear -o cache_dir=.pytest_cache2 --basetemp=.pytest_temp

      - name: Data preparation smoke test
        run: python data_prep.py --rows 100

      - name: Training smoke test
        run: python train.py --config configs/qlearning_v1.yaml --run_id ci_smoke

      - name: API smoke test
        run: |
          uvicorn api:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl -f http://127.0.0.1:8000/health
